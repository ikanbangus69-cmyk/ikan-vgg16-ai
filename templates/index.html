<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Classification AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #56CCF2, #2F80ED);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .25);
            overflow: hidden;
            background: white;
        }

        .upload-box {
            border: 2px dashed #0d6efd;
            border-radius: 15px;
            padding: 20px;
            background: #f8fbff;
        }

        .prediction {
            font-size: 28px;
            font-weight: bold;
            color: #0d6efd;
        }

        .preview {
            width: 100%;
            margin-top: 15px;
            display: none;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="main-card p-4">

                <h3 class="text-center text-primary mb-1">🐟 Fish Classification AI</h3>
                <p class="text-center text-muted">VGG16 Transfer Learning</p>

                <form action="/predict" method="POST" enctype="multipart/form-data">

                    <div class="upload-box">

                        <input type="file" name="image" id="imageInput" class="form-control" required>

                        <img id="preview" class="preview">

                        <button class="btn btn-primary w-100 mt-3">
                            Predict
                        </button>

                    </div>

                </form>

                {% if filename %}

                <hr>

                <div class="row">
                    <div class="col-md-5">
                        <img src="/uploads/{{ filename }}" class="img-fluid rounded">
                    </div>

                    <div class="col-md-7">
                        <h5>Hasil:</h5>

                        <div class="prediction">
                            {{ prediction }}
                        </div>

                        <div class="progress mt-3">
                            <div class="progress-bar bg-success"
                                 style="width: {{ confidence }}%;">
                                {{ confidence }}%
                            </div>
                        </div>
                    </div>
                </div>

                {% endif %}

                {% if error %}
                <div class="alert alert-danger mt-3">
                    {{ error }}
                </div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

<script>
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});
</script>

</body>
</html>
